<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="author" content="Atalariq Barra Hadinugraha" />
    <meta
      name="description"
      content="Atalariq Barra Hadinugraha — CS student from Indonesia, platform-engineer-in-training. A terminal-UI portfolio."
    />
    <meta name="color-scheme" content="dark light" />
    <script>
      // Set theme before first paint to avoid a flash.
      try {
        var t = localStorage.getItem("theme");
        if (t === "light" || t === "dark")
          document.documentElement.setAttribute("data-theme", t);
      } catch (e) {}
    </script>

    <meta property="og:type" content="website" />
    <meta property="og:title" content="atalariq — terminal portfolio" />
    <meta
      property="og:description"
      content="CS student from Indonesia. Platform engineering, DevOps, agentic workflows."
    />
    <meta property="og:url" content="https://atalariq.dev" />
    <meta property="og:image" content="https://atalariq.dev/assets/og.png" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:image" content="https://atalariq.dev/assets/og.png" />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;500;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="tokens/base.css" />
    <link rel="stylesheet" href="style.css" />

    <link rel="icon" href="/assets/favicon.svg" type="image/svg+xml" />
    <link rel="icon" href="/assets/favicon-32.png" sizes="32x32" />
    <link rel="apple-touch-icon" href="/assets/apple-touch-icon.png" />
    <title>atalariq@portfolio</title>
  </head>
  <body>
    <main id="terminal" class="terminal" aria-label="terminal portfolio">
      <!-- Title bar -->
      <header class="titlebar">
        <span class="window-title">atalariq@portfolio</span>
        <span class="titlebar-right">
          <button
            id="help-toggle"
            class="icon-btn"
            type="button"
            aria-label="Keyboard shortcuts"
            aria-haspopup="dialog"
          >
            ?
          </button>
          <button
            id="theme-toggle"
            class="theme-toggle"
            type="button"
            aria-label="Toggle light/dark theme"
            aria-pressed="true"
          >
            <svg
              class="icon-sun"
              viewBox="0 0 24 24"
              width="16"
              height="16"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
              stroke-linecap="round"
              stroke-linejoin="round"
              aria-hidden="true"
            >
              <circle cx="12" cy="12" r="4" />
              <path
                d="M12 2v2M12 20v2M4.9 4.9l1.4 1.4M17.7 17.7l1.4 1.4M2 12h2M20 12h2M6.3 17.7l-1.4 1.4M19.1 4.9l-1.4 1.4"
              />
            </svg>
            <svg
              class="icon-moon"
              viewBox="0 0 24 24"
              width="16"
              height="16"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
              stroke-linecap="round"
              stroke-linejoin="round"
              aria-hidden="true"
            >
              <path d="M21 12.8A9 9 0 1 1 11.2 3 7 7 0 0 0 21 12.8z" />
            </svg>
          </button>
          <span class="titlebar-dots" aria-hidden="true">● ● ●</span>
        </span>
      </header>

      <!-- Tab bar -->
      <nav class="tabbar" role="tablist" aria-label="sections">
        <button
          class="tab"
          role="tab"
          id="tab-about"
          data-tab="about"
          aria-selected="true"
          aria-controls="screen"
        >
          about
        </button>
        <button
          class="tab"
          role="tab"
          id="tab-linktree"
          data-tab="linktree"
          aria-selected="false"
          aria-controls="screen"
        >
          linktree
        </button>
        <button
          class="tab"
          role="tab"
          id="tab-projects"
          data-tab="projects"
          aria-selected="false"
          aria-controls="screen"
        >
          projects
        </button>
        <button
          class="tab"
          role="tab"
          id="tab-vision"
          data-tab="vision"
          aria-selected="false"
          aria-controls="screen"
        >
          vision
        </button>
        <button
          class="tab"
          role="tab"
          id="tab-contact"
          data-tab="contact"
          aria-selected="false"
          aria-controls="screen"
        >
          contact
        </button>
      </nav>

      <!-- Screen: scrollable output log with the live prompt as its last line -->
      <div class="screen" id="screen">
        <!-- typed-command output log -->
        <div id="output" class="cmd-output" aria-live="polite"></div>

        <!-- Prompt: follows the output, scrolls with it -->
        <form id="prompt-form" class="promptbar" autocomplete="off">
          <div class="prompt-info" id="prompt-info"></div>
          <div class="prompt-line">
            <label for="prompt-input" class="prompt-char" id="prompt-char"
              >❯</label
            >
            <input
              id="prompt-input"
              class="prompt-input"
              type="text"
              name="cmd"
              aria-label="terminal command input"
              autocomplete="off"
              autocapitalize="off"
              autocorrect="off"
              spellcheck="false"
            />
          </div>
        </form>
      </div>

      <!-- Keyboard-shortcut overlay (opened by ?, Ctrl+/, or `keys`) -->
      <div
        id="shortcut-overlay"
        class="overlay"
        role="dialog"
        aria-modal="true"
        aria-label="Keyboard shortcuts"
        hidden
      >
        <div class="overlay-card">
          <div class="overlay-head">
            <span class="green">keyboard shortcuts</span>
            <button
              id="overlay-close"
              class="icon-btn"
              type="button"
              aria-label="Close"
            >
              ✕
            </button>
          </div>
          <dl class="shortcut-list">
            <div>
              <dt>Tab</dt>
              <dd>complete command / path</dd>
            </div>
            <div>
              <dt>↑ / ↓</dt>
              <dd>command history</dd>
            </div>
            <div>
              <dt>Ctrl+L</dt>
              <dd>clear the screen</dd>
            </div>
            <div>
              <dt>Ctrl+U</dt>
              <dd>clear the line</dd>
            </div>
            <div>
              <dt>Ctrl+A / Ctrl+E</dt>
              <dd>line start / end</dd>
            </div>
            <div>
              <dt>Ctrl+C</dt>
              <dd>cancel the line</dd>
            </div>
            <div>
              <dt>Ctrl+/</dt>
              <dd>this overlay</dd>
            </div>
            <div>
              <dt>Esc</dt>
              <dd>close the overlay</dd>
            </div>
          </dl>
          <p class="overlay-foot dim">
            type <span class="yellow">help</span> for commands,
            <span class="yellow">man &lt;cmd&gt;</span> for details
          </p>
        </div>
      </div>
    </main>

    <script type="module">
      import { bootstrap } from "./terminal.js";
      bootstrap();
    </script>
  </body>
</html>
