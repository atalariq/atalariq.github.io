<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="author" content="Atalariq Barra Hadinugraha" />
    <meta
      name="description"
      content="Atalariq Barra Hadinugraha — CS student from Indonesia, platform-engineer-in-training. A terminal-UI portfolio."
    />
    <meta name="color-scheme" content="dark light" />
    <script>
      // Set theme before first paint to avoid a flash.
      try {
        var t = localStorage.getItem("theme");
        if (t === "light" || t === "dark")
          document.documentElement.setAttribute("data-theme", t);
      } catch (e) {}
    </script>

    <meta property="og:type" content="website" />
    <meta property="og:title" content="atalariq — terminal portfolio" />
    <meta
      property="og:description"
      content="CS student from Indonesia. Platform engineering, DevOps, agentic workflows."
    />
    <meta property="og:url" content="https://atalariq.dev" />
    <meta property="og:image" content="https://atalariq.dev/assets/og.png" />
    <meta name="twitter:card" content="summary_large_image" />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;500;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="tokens/base.css" />
    <link rel="stylesheet" href="style.css" />
    <title>atalariq@portfolio</title>
  </head>
  <body>
    <main id="terminal" class="terminal" aria-label="terminal portfolio">
      <!-- Title bar -->
      <header class="titlebar">
        <span class="prompt-label">atalariq@portfolio:~$</span>
        <span class="titlebar-dots" aria-hidden="true">● ● ●</span>
      </header>

      <!-- Tab bar -->
      <nav class="tabbar" role="tablist" aria-label="sections">
        <button
          class="tab"
          role="tab"
          id="tab-about"
          data-tab="about"
          aria-selected="true"
          aria-controls="screen"
        >
          about
        </button>
        <button
          class="tab"
          role="tab"
          id="tab-linktree"
          data-tab="linktree"
          aria-selected="false"
          aria-controls="screen"
        >
          linktree
        </button>
        <button
          class="tab"
          role="tab"
          id="tab-projects"
          data-tab="projects"
          aria-selected="false"
          aria-controls="screen"
        >
          projects
        </button>
        <button
          class="tab"
          role="tab"
          id="tab-vision"
          data-tab="vision"
          aria-selected="false"
          aria-controls="screen"
        >
          vision
        </button>
        <button
          class="tab"
          role="tab"
          id="tab-contact"
          data-tab="contact"
          aria-selected="false"
          aria-controls="screen"
        >
          contact
        </button>
      </nav>

      <!-- Screen: scrollable output log with the live prompt as its last line -->
      <div class="screen" id="screen">
        <!-- typed-command output log -->
        <div id="output" class="cmd-output" aria-live="polite"></div>

        <!-- Prompt: follows the output, scrolls with it -->
        <form id="prompt-form" class="promptbar" autocomplete="off">
          <label for="prompt-input" class="prompt-label"
            >atalariq@portfolio:~$</label
          >
          <input
            id="prompt-input"
            class="prompt-input"
            type="text"
            name="cmd"
            aria-label="terminal command input"
            autocomplete="off"
            autocapitalize="off"
            autocorrect="off"
            spellcheck="false"
          />
        </form>
      </div>
    </main>

    <script type="module">
      import { bootstrap } from "./terminal.js";
      bootstrap();
    </script>
  </body>
</html>
